<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06070b"/>
      <stop offset="100%" stop-color="#0b0d14"/>
    </linearGradient>
    <linearGradient id="legend" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#1f6dff"/>
      <stop offset="50%" stop-color="#44506a"/>
      <stop offset="100%" stop-color="#ff4b3e"/>
    </linearGradient>
    <filter id="glowRed" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowBlue" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)"/>

  <text x="58" y="78" fill="#f5f7ff" font-size="34" font-family="Segoe UI, Arial, sans-serif">电位网格三维可视化 - 概念效果图</text>
  <text x="60" y="118" fill="#9fa9c3" font-size="18" font-family="Segoe UI, Arial, sans-serif">黑色背景 / 地线零平面 / 连续曲面 / 节点亮点 / 红高蓝低 / 可旋转三维视图</text>

  <!-- 3D scene frame -->
  <rect x="50" y="150" width="1180" height="760" rx="18" fill="#090b12" stroke="#1f2433" stroke-width="2"/>

  <!-- Zero plane -->
  <polygon points="170,690 640,440 1120,525 690,780" fill="#101522" stroke="#364055" stroke-width="1.5"/>

  <!-- Base grid -->
  <g stroke="#283145" stroke-width="1">
    <line x1="220" y1="722" x2="674" y2="481"/>
    <line x1="276" y1="713" x2="729" y2="472"/>
    <line x1="332" y1="703" x2="785" y2="463"/>
    <line x1="388" y1="694" x2="841" y2="454"/>
    <line x1="444" y1="684" x2="896" y2="445"/>
    <line x1="500" y1="675" x2="952" y2="437"/>
    <line x1="556" y1="665" x2="1008" y2="429"/>
    <line x1="612" y1="656" x2="1064" y2="421"/>
    <line x1="668" y1="647" x2="1118" y2="525"/>

    <line x1="206" y1="676" x2="1122" y2="526"/>
    <line x1="257" y1="649" x2="1070" y2="517"/>
    <line x1="308" y1="622" x2="1017" y2="508"/>
    <line x1="359" y1="595" x2="965" y2="500"/>
    <line x1="410" y1="568" x2="913" y2="491"/>
    <line x1="461" y1="541" x2="860" y2="482"/>
    <line x1="512" y1="514" x2="808" y2="473"/>
    <line x1="563" y1="487" x2="756" y2="465"/>
    <line x1="614" y1="460" x2="704" y2="456"/>
  </g>

  <!-- Ridge / valley continuous surface -->
  <path d="M238 675
           C320 650, 380 618, 435 585
           C496 548, 540 506, 588 470
           C650 423, 730 394, 815 382
           C895 370, 958 390, 1005 434
           C1037 464, 1060 491, 1093 517"
        fill="none" stroke="#ff5a42" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" filter="url(#glowRed)"/>

  <path d="M248 687
           C330 666, 396 634, 455 598
           C517 560, 565 518, 615 481
           C676 437, 750 409, 828 398
           C902 388, 960 408, 1003 448
           C1035 477, 1058 500, 1087 520"
        fill="none" stroke="#ff8a5b" stroke-width="4" opacity="0.85"/>

  <path d="M228 709
           C315 696, 404 689, 500 681
           C598 673, 683 653, 759 620
           C833 588, 889 553, 936 520
           C978 491, 1020 470, 1068 462"
        fill="none" stroke="#2d7fff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" filter="url(#glowBlue)"/>

  <path d="M234 718
           C322 707, 412 699, 507 692
           C603 685, 686 665, 760 635
           C831 606, 888 571, 934 538
           C973 511, 1013 489, 1057 480"
        fill="none" stroke="#6cb3ff" stroke-width="4" opacity="0.9"/>

  <!-- Surface mesh curves -->
  <g stroke-width="1.8" fill="none" opacity="0.88">
    <path d="M245 682 C347 640, 457 596, 579 484 C673 398, 802 355, 937 392 C1008 412, 1060 465, 1092 520" stroke="#d55b59"/>
    <path d="M257 700 C360 664, 474 619, 585 519 C681 432, 802 393, 916 418 C981 433, 1032 474, 1072 514" stroke="#6b82c9"/>
    <path d="M300 708 C415 690, 532 682, 648 655 C745 632, 831 583, 926 510 C987 462, 1039 447, 1086 452" stroke="#4b68a9"/>
    <path d="M266 650 C361 615, 467 568, 569 487 C678 401, 807 364, 930 401 C1007 425, 1061 474, 1088 507" stroke="#be5150"/>
    <path d="M220 705 C317 688, 425 683, 537 674 C652 664, 741 630, 826 577 C899 531, 972 479, 1070 458" stroke="#3a72d3"/>
  </g>

  <!-- node highlights -->
  <g filter="url(#softGlow)">
    <circle cx="239" cy="676" r="7" fill="#ffd26a"/>
    <circle cx="433" cy="586" r="7" fill="#ffd26a"/>
    <circle cx="590" cy="470" r="7" fill="#ffd26a"/>
    <circle cx="814" cy="382" r="7" fill="#ffd26a"/>
    <circle cx="1006" cy="435" r="7" fill="#ffd26a"/>
    <circle cx="1070" cy="461" r="7" fill="#ffd26a"/>
    <circle cx="758" cy="620" r="7" fill="#bfe3ff"/>
    <circle cx="936" cy="520" r="7" fill="#bfe3ff"/>
    <circle cx="1067" cy="462" r="7" fill="#bfe3ff"/>
  </g>

  <!-- axes -->
  <g stroke-width="3" font-family="Segoe UI, Arial, sans-serif">
    <line x1="150" y1="790" x2="285" y2="790" stroke="#ff6d5e"/>
    <line x1="150" y1="790" x2="150" y2="638" stroke="#5ab6ff"/>
    <line x1="150" y1="790" x2="86" y2="720" stroke="#8de35a"/>
    <text x="295" y="796" fill="#ff9a8f" font-size="20">X</text>
    <text x="142" y="626" fill="#8fd0ff" font-size="20">Z</text>
    <text x="64" y="715" fill="#b5f08a" font-size="20">Y</text>
    <text x="165" y="634" fill="#8fa0bb" font-size="16">电位高度</text>
  </g>

  <!-- legend -->
  <g transform="translate(1270,170)">
    <rect x="0" y="0" width="280" height="740" rx="18" fill="#0b0f18" stroke="#222a3d" stroke-width="2"/>
    <text x="30" y="52" fill="#f5f7ff" font-size="28" font-family="Segoe UI, Arial, sans-serif">图例与说明</text>

    <rect x="38" y="92" width="28" height="220" rx="8" fill="url(#legend)" stroke="#2d3548" stroke-width="1.5"/>
    <text x="82" y="108" fill="#ffb2aa" font-size="18" font-family="Segoe UI, Arial, sans-serif">高电位</text>
    <text x="82" y="206" fill="#c9d3eb" font-size="18" font-family="Segoe UI, Arial, sans-serif">0V 零平面</text>
    <text x="82" y="302" fill="#9fc9ff" font-size="18" font-family="Segoe UI, Arial, sans-serif">低电位</text>

    <circle cx="52" cy="365" r="7" fill="#ffd26a" filter="url(#softGlow)"/>
    <text x="82" y="371" fill="#d5def5" font-size="18" font-family="Segoe UI, Arial, sans-serif">真实节点亮点</text>

    <line x1="38" y1="410" x2="120" y2="410" stroke="#ff684d" stroke-width="8" stroke-linecap="round"/>
    <text x="132" y="417" fill="#d5def5" font-size="18" font-family="Segoe UI, Arial, sans-serif">高电位山脊</text>

    <line x1="38" y1="450" x2="120" y2="450" stroke="#3d88ff" stroke-width="8" stroke-linecap="round"/>
    <text x="132" y="457" fill="#d5def5" font-size="18" font-family="Segoe UI, Arial, sans-serif">低电位山谷</text>

    <rect x="32" y="505" width="212" height="140" rx="14" fill="#101624" stroke="#273049"/>
    <path d="M48 615 C82 612, 112 605, 142 580 C170 557, 198 540, 228 538"
          fill="none" stroke="#4085ff" stroke-width="7" stroke-linecap="round"/>
    <path d="M50 575 C92 560, 136 540, 178 512 C198 499, 222 494, 240 505"
          fill="none" stroke="#ff6a52" stroke-width="7" stroke-linecap="round"/>
    <circle cx="178" cy="512" r="6" fill="#ffd26a"/>
    <text x="48" y="532" fill="#d5def5" font-size="16" font-family="Segoe UI, Arial, sans-serif">连续曲面跨器件过渡</text>

    <text x="32" y="700" fill="#9fa9c3" font-size="16" font-family="Segoe UI, Arial, sans-serif">第一版目标</text>
    <text x="32" y="730" fill="#dfe6fb" font-size="17" font-family="Segoe UI, Arial, sans-serif">- 独立 3D 窗口</text>
    <text x="32" y="758" fill="#dfe6fb" font-size="17" font-family="Segoe UI, Arial, sans-serif">- 全区域连续网格面</text>
    <text x="32" y="786" fill="#dfe6fb" font-size="17" font-family="Segoe UI, Arial, sans-serif">- 20~30 FPS 动态刷新</text>
    <text x="32" y="814" fill="#dfe6fb" font-size="17" font-family="Segoe UI, Arial, sans-serif">- 地线作为零电位面</text>
    <text x="32" y="842" fill="#dfe6fb" font-size="17" font-family="Segoe UI, Arial, sans-serif">- 保留节点亮点</text>
  </g>

  <!-- caption -->
  <text x="60" y="944" fill="#6f7b98" font-size="16" font-family="Segoe UI, Arial, sans-serif">
    说明：本图为概念效果图，用于固定视觉目标，不代表最终程序界面细节。
  </text>
</svg>
